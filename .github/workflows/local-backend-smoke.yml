name: local-backend-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install llama.cpp binary
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl unzip

          API_URL="https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          ASSET_URL="$(
            curl -fsSL "$API_URL" | python3 -c '
import json, sys
data = json.load(sys.stdin)
assets = data.get("assets", [])
cands = []
for a in assets:
    name = (a.get("name") or "").lower()
    url = a.get("browser_download_url") or ""
    if "ubuntu" in name and "x64" in name and name.endswith(".zip"):
        cands.append((name, url))
if not cands:
    sys.exit(1)
# Prefer assets that include binaries in the name
cands.sort(key=lambda x: (("bin" not in x[0]), x[0]))
print(cands[0][1])
'
          )"

          if [ -z "${ASSET_URL:-}" ]; then
            echo "Could not find a suitable ubuntu x64 llama.cpp release asset."
            exit 1
          fi

          echo "Downloading llama.cpp asset: $ASSET_URL"
          curl -fL "$ASSET_URL" -o llama.zip

          unzip -q llama.zip -d llama_bin
          chmod +x llama_bin/llama-cli
          echo "$PWD/llama_bin" >> "$GITHUB_PATH"

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[hf]"

      - name: Check runtime
        run: |
          sigilant-sweep info
          llama-cli --version

      - name: Local backend smoke
        run: |
          sigilant-sweep run \
            --model Qwen/Qwen2.5-1.5B-Instruct-GGUF \
            --backend local \
            --engine llama.cpp \
            --configs 1 \
            --trials 1
