name: local-backend-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build llama.cpp (llama-cli)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git cmake build-essential

          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cmake -S llama.cpp -B llama.cpp/build -DGGML_CUDA=OFF
          cmake --build llama.cpp/build --target llama-cli -j"$(nproc)"

          chmod +x llama.cpp/build/bin/llama-cli
          echo "$PWD/llama.cpp/build/bin" >> "$GITHUB_PATH"

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[hf]"

      - name: Check runtime
        run: |
          sigilant-sweep info
          llama-cli --version

      - name: Local backend smoke
        run: |
          sigilant-sweep run \
            --model Qwen/Qwen2.5-1.5B-Instruct-GGUF \
            --backend local \
            --engine llama.cpp \
            --configs 16 \
            --trials 1 \
            --only-config "Q5_K_M,16384,k16v16,long"
