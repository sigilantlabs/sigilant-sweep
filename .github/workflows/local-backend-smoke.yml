name: local-backend-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build llama.cpp (llama-cli)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git cmake build-essential

          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cmake -S llama.cpp -B llama.cpp/build -DGGML_CUDA=OFF
          cmake --build llama.cpp/build --target llama-cli -j"$(nproc)"

          chmod +x llama.cpp/build/bin/llama-cli
          echo "$PWD/llama.cpp/build/bin" >> "$GITHUB_PATH"

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e ".[hf]"

      - name: Check runtime
        run: |
          sigilant-sweep info
          llama-cli --version

      - name: Debug llama-cli raw output
        run: |
          set -euo pipefail
          python3 -m pip install -q huggingface-hub

          MODEL_PATH="$(python3 -c 'from huggingface_hub import hf_hub_download; print(hf_hub_download(repo_id="Qwen/Qwen2.5-1.5B-Instruct-GGUF", filename="qwen2.5-1.5b-instruct-q5_k_m.gguf"))')"

          echo "MODEL_PATH=$MODEL_PATH"

          echo "=== llama-cli generation raw ==="
          llama-cli \
            -m "$MODEL_PATH" \
            -p "hello" \
            --single-turn \
            --temp 0 \
            --top-k 1 \
            --seed 42 \
            -t 6 \
            -n 32 \
            --ctx-size 16384 \
            --simple-io \
            2>&1 | tee llama_gen_raw.log

          echo "=== llama-cli perplexity raw ==="
          printf "test corpus for ppl\n" > ppl_tmp.txt
          llama-cli \
            -m "$MODEL_PATH" \
            --perplexity \
            --file ppl_tmp.txt \
            --ctx-size 512 \
            --no-display-prompt \
            2>&1 | tee llama_ppl_raw.log

      - name: Local backend smoke
        run: |
          sigilant-sweep run \
            --model Qwen/Qwen2.5-1.5B-Instruct-GGUF \
            --backend local \
            --engine llama.cpp \
            --configs 16 \
            --trials 1 \
            --only-config "Q5_K_M,16384,k16v16,long"

      - name: CI metric sanity check
        run: |
          python3 -c "import json,sys; from pathlib import Path; p=Path('sigilant_results.json'); d=json.loads(p.read_text()) if p.exists() else None; rows=(d.get('results') or []) if d else []; ok=[r for r in rows if r.get('succeeded')]; w=ok[0] if ok else None; tps=float((w or {}).get('tps') or 0.0); ttft=float((w or {}).get('ttft_ms') or 0.0); print('winner row:', w); sys.exit(0 if (p.exists() and w is not None and tps>0.0 and ttft>0.0) else 1)"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-backend-smoke-artifacts
          path: |
            sigilant_results.json
            sigilant_summary.md
            sigilant_frontier.svg
            sigilant_terminal.txt
            llama_gen_raw.log
            llama_ppl_raw.log
            artifacts/runs/**
          if-no-files-found: warn
